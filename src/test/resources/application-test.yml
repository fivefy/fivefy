spring:
  datasource:
    primary:
      jdbc-url: jdbc:mysql://localhost:3306/fivefy_test?serverTimezone=Asia/Seoul
      username: root
      password: 12345678
      driver-class-name: com.mysql.cj.jdbc.Driver
    vector:
      jdbc-url: jdbc:postgresql://localhost:5432/fivefy_vector_test
      username: root2
      password: 23456789
      driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  flyway:
    enabled: false
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: bge-m3
      init:
        pull-model-strategy: never
    anthropic:
      api-key: fivefy-test-secret-api-key-for-test-anthropic
      chat:
        options:
          model: claude-haiku-4-5-20251001
          max-tokens: 200
          temperature: 0.3

kafka:
  bootstrap-servers: localhost:9092,localhost:9093,localhost:9094

jwt:
  secret: fivefy-test-secret-key-for-local-only

app:
  add-wallet-dummy-test-data: false

portone:
  api-secret: test
  store-id: test
  api-url: test
  channel-key: test
  webhook-secret: test

scheduler:
  charge-cron: "0 0 8 1 * *"
  subscription-cron: "0 0 9 1 * *"

resilience4j:
  retry:
    instances:
      ollamaEmbedding:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
      anthropicChat:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
  circuitbreaker:
    instances:
      ollamaEmbedding:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      anthropicChat:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10