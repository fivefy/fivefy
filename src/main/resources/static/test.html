<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fivefy Music</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Pretendard',sans-serif;
  background:#09090f;
  color:white;
  overflow:hidden;
}

.app{
  display:flex;
  height:100vh;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
  width:280px;
  background:#050507;
  border-right:1px solid rgba(255,255,255,0.06);
  display:flex;
  flex-direction:column;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  padding:24px;
}

.logo{
  font-size:42px;
  font-weight:800;
  margin-bottom:40px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.menu-item{
  padding:16px;
  border-radius:16px;
  cursor:pointer;
  transition:.2s;
  color:#ccc;
  font-weight:600;
}

.menu-item:hover{
  background:#17171f;
  color:white;
}

.menu-item.active{
  background:linear-gradient(90deg,#8b5cf6,#a855f7);
  color:white;
}

.playlist-section{
  margin-top:40px;
  overflow:auto;
}

.playlist-title{
  font-size:14px;
  color:#999;
  margin-bottom:16px;
}

.playlist-item{
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:8px;
}

.playlist-item:hover{
  background:#17171f;
}

/* =========================
CONTENT
========================= */

.main{
  margin-left:280px;
  width:calc(100% - 280px);
  overflow-y:auto;
  height:100vh;
}

.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(9,9,15,0.8);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 40px;
}

.search{
  width:500px;
  padding:16px 20px;
  border:none;
  border-radius:999px;
  background:#18181f;
  color:white;
}

.top-actions{
  display:flex;
  gap:16px;
}

.btn{
  border:none;
  border-radius:999px;
  padding:12px 20px;
  font-weight:700;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(90deg,#8b5cf6,#a855f7);
  color:white;
}

.btn-dark{
  background:#18181f;
  color:white;
}

/* =========================
CONTENT AREA
========================= */

.content{
  padding:40px;
}

.hero{
  height:300px;
  border-radius:32px;
  background:
    linear-gradient(135deg,#8b5cf6,#1e1b4b);
  margin-bottom:40px;
  display:flex;
  align-items:center;
  padding:40px;
}

.hero-text h1{
  font-size:54px;
  margin-bottom:16px;
}

.hero-text p{
  color:#ccc;
  font-size:18px;
}

.section{
  margin-bottom:50px;
}

.section-title{
  font-size:34px;
  font-weight:800;
  margin-bottom:24px;
}

.track-list{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.track{
  background:#12121a;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.track-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.album{
  width:64px;
  height:64px;
  border-radius:16px;
  background:linear-gradient(135deg,#facc15,#1e1b4b);
}

.track-info h3{
  margin-bottom:6px;
}

.track-info p{
  color:#999;
}

.play-btn{
  width:54px;
  height:54px;
  border-radius:50%;
  border:none;
  background:#8b5cf6;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* =========================
BOTTOM PLAYER
========================= */

.player{
  position:fixed;
  bottom:0;
  left:280px;
  right:0;
  height:100px;
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
}

.player-track{
  display:flex;
  align-items:center;
  gap:16px;
}

.player-cover{
  width:60px;
  height:60px;
  border-radius:16px;
  background:linear-gradient(135deg,#8b5cf6,#111827);
}

.controls{
  display:flex;
  align-items:center;
  gap:20px;
}

.control-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:#8b5cf6;
  color:white;
  cursor:pointer;
}

audio{
  width:320px;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">Music</div>

    <div class="menu">
      <div class="menu-item active">🏠 홈</div>
      <div class="menu-item">🔍 검색</div>
      <div class="menu-item">📚 보관함</div>
      <div class="menu-item">💎 구독</div>
      <div class="menu-item">💳 PG 테스트</div>
    </div>

    <div class="playlist-section">
      <div class="playlist-title">플레이리스트</div>

      <div class="playlist-item">🎵 감성 충전</div>
      <div class="playlist-item">🎵 운동할 때 듣는 음악</div>
      <div class="playlist-item">🎵 새 플레이리스트</div>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">

      <input class="search"
        placeholder="노래, 아티스트, 분위기 검색"/>

      <div class="top-actions">
        <button class="btn btn-dark">새로고침</button>
        <button class="btn btn-primary">내 계정</button>
      </div>

    </div>

    <!-- CONTENT -->
    <div class="content">

      <div class="hero">
        <div class="hero-text">
          <h1>Fivefy Music</h1>
          <p>
            AI 기반 음악 추천과 스트리밍 플랫폼
          </p>
        </div>
      </div>

      <!-- 인기곡 -->
      <section class="section">

        <div class="section-title">
          인기 차트 TOP 100
        </div>

        <div class="track-list">

          <div class="track">

            <div class="track-left">

              <div class="album"></div>

              <div class="track-info">
                <h3>숲속 AI 버전</h3>
                <p>Fivefy Artist · 3:30</p>
              </div>

            </div>

            <button class="play-btn"
              onclick="playMusic()">
              ▶
            </button>

          </div>

        </div>

      </section>

    </div>

  </main>

</div>

<!-- PLAYER -->
<div class="player">

  <div class="player-track">

    <div class="player-cover"></div>

    <div>
      <h3 id="currentTitle">
        아직 재생 중인 곡이 없습니다
      </h3>
      <p id="currentArtist">
        Fivefy
      </p>
    </div>

  </div>

  <div class="controls">

    <button class="control-btn">
      ⏮
    </button>

    <button class="control-btn"
      onclick="togglePlay()">
      ⏯
    </button>

    <button class="control-btn">
      ⏭
    </button>

  </div>

  <audio id="audio" controls></audio>

</div>

<script>
const audio = document.getElementById('audio');

function playMusic(){

  audio.src =
  'https://YOUR_BUCKET.s3.ap-northeast-2.amazonaws.com/forest-ai-v1.mp3';

  audio.play();

  document.getElementById('currentTitle')
    .innerText = '숲속 AI 버전';

  document.getElementById('currentArtist')
    .innerText = 'Fivefy Artist';
}

function togglePlay(){

  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }

}
</script>

</body>
</html>
