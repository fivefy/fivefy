spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

jwt:
  secret: ${JWT_SECRET}

### 포트원 ###
portone:
  # 포트원 콘솔 > 결제연동 > V2 API Secret
  api-secret: ${PORTONE_API_SECRET}
  # 포트원 콘솔 > 연동 정보 > 상점 ID
  store-id: ${PORTONE_STORE_ID}
  # 포트원 API Url
  api-url: ${PORTONE_API_URL}
  channel-key: ${PORTONE_CHANNEL_KEY}
  # 웹훅 시크릿 키
  webhook-secret: ${PORTON_WEBHOOK_SECRET}


