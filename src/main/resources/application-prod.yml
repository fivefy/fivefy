spring:
  config:
    activate:
      on-profile: prod

  datasource:
    primary:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
    vector:
      url: ${VECTOR_DB_URL}
      username: ${VECTOR_DB_USERNAME}
      password: ${VECTOR_DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      embedding:
        options:
          model: bge-m3
      init:
        pull-model-strategy: never
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          max-tokens: 200
          temperature: 0.3

custom:
  flyway:
    mysql:
      enabled: true
    postgre:
      enabled: true

kafka:
  bootstrap-servers: ${KAFKA_SERVERS}

storage:
  audio:
    type: s3
    bucket: ${AUDIO_S3_BUCKET}
    region: ${AWS_REGION}
    prefix: tracks/audio

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: WARN
    com.fivefy: INFO

### 포트원 ###
portone:
  # 포트원 콘솔 > 결제연동 > V2 API Secret
  api-secret: ${PORTONE_API_SECRET}
  # 포트원 콘솔 > 연동 정보 > 상점 ID
  store-id: ${PORTONE_STORE_ID}
  # 포트원 API Url
  api-url: ${PORTONE_API_URL}
  channel-key: ${PORTONE_CHANNEL_KEY}
  # 웹훅 시크릿 키
  webhook-secret: ${PORTONE_WEBHOOK_SECRET}
  # 빌링키
  channel-key-billing: ${PORTONE_CHANNEL_KEY_BILLING}

### 운영 ###
scheduler:
  # 포인트 충전(Cashorder-payment)             : 매일 8시 01분 실행
  charge-cron: ${CHARGE_CRON}
  # 구독 패키지 구매(PointOrder-Subscription)  : 매일 9시 01분 실행
  subscription-cron: ${SUBSCRIPTION_CRON}

resilience4j:
  retry:
    instances:
      ollamaEmbedding:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
      anthropicChat:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
  circuitbreaker:
    instances:
      ollamaEmbedding:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      anthropicChat:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
