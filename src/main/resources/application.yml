spring:
  profiles:
    active: local
  jpa:
    properties:
      hibernate:
        format_sql: true

jwt:
  access-expiration: 1800000    # 30분
  refresh-expiration: 604800000 # 7일

---
spring:
  config:
    activate:
      on-profile: local

storage:
  audio:
    # 로컬 기본 실행도 실제 S3 업로드 사용
    # AWS 없이 로컬 디스크 저장으로 테스트하려면 개인 application-local.yml에서 type/local-root override
    type: s3
    bucket: ${AUDIO_S3_BUCKET:}
    region: ${AWS_REGION:ap-northeast-2}
    prefix: tracks/audio
    # type=local override 시 audioKey를 이 디렉터리 하위 경로로 저장
    local-root: build/audio-storage
