name: CI — Build & Test

on:
  pull_request:
    branches: [ dev, stage, main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.4
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mysql:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: 12345678
          MYSQL_DATABASE: fivefy_test
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -p12345678"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: root2
          POSTGRES_PASSWORD: 23456789
          POSTGRES_DB: fivefy_vector_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew build --no-daemon # -x test test 건너뛰기 # -x asciidoctor API 자동화문서 건너뛰기
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          SPRING_DATASOURCE_PRIMARY_JDBC_URL: jdbc:mysql://localhost:3306/fivefy_test?serverTimezone=Asia/Seoul
          SPRING_DATASOURCE_PRIMARY_USERNAME: root
          SPRING_DATASOURCE_PRIMARY_PASSWORD: 12345678
          SPRING_DATASOURCE_VECTOR_JDBC_URL: jdbc:postgresql://localhost:5432/fivefy_vector_test
          SPRING_DATASOURCE_VECTOR_USERNAME: root2
          SPRING_DATASOURCE_VECTOR_PASSWORD: 23456789
          SCHEDULER_CHARGE_CRON: "0 1 8 * * *"
          SCHEDULER_SUBSCRIPTION_CRON: "0 1 9 * * *"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: build/reports/tests/

      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **빌드/테스트 실패** — 로그를 확인해주세요.'
            })