name: CD — Deploy

on:
  pull_request:
    branches: [ stage, main ]
    types: [ closed ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # CI에서 이미 테스트 통과 → 테스트 스킵
      - name: Build JAR
        run: ./gradlew bootJar -x test --no-daemon

      # 배포 환경 결정
      - name: Set deploy environment
        id: env
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "port=8081" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.DB_URL_PROD }}" >> $GITHUB_OUTPUT
            echo "db_username=${{ secrets.DB_USERNAME_PROD }}" >> $GITHUB_OUTPUT
            echo "db_password=${{ secrets.DB_PASSWORD_PROD }}" >> $GITHUB_OUTPUT
            echo "jwt_secret=${{ secrets.JWT_SECRET_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "name=stage" >> $GITHUB_OUTPUT
            echo "port=8080" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.DB_URL_STAGE }}" >> $GITHUB_OUTPUT
            echo "db_username=${{ secrets.DB_USERNAME_STAGE }}" >> $GITHUB_OUTPUT
            echo "db_password=${{ secrets.DB_PASSWORD_STAGE }}" >> $GITHUB_OUTPUT
            echo "jwt_secret=${{ secrets.JWT_SECRET_STAGE }}" >> $GITHUB_OUTPUT
          fi

      # JAR → NCP Object Storage 업로드 (S3 호환 API)
      - name: Upload JAR to Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NCP_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NCP_SECRET_KEY }}
          AWS_DEFAULT_REGION: kr-standard
        run: |
          DEPLOY_ENV=${{ steps.env.outputs.name }}
          aws s3 cp build/libs/*.jar \
            s3://${{ secrets.NCP_BUCKET_DEPLOY }}/deploy/$DEPLOY_ENV/app.jar \
            --endpoint-url=https://kr.object.ncloudstorage.com

      # SSH 키 설정
      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/server_key
          chmod 600 ~/.ssh/bastion_key ~/.ssh/server_key
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

      # Bastion 경유 App Server 배포
      - name: Deploy via Bastion
        env:
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
          PORT: ${{ steps.env.outputs.port }}
          DB_URL: ${{ steps.env.outputs.db_url }}
          DB_USERNAME: ${{ steps.env.outputs.db_username }}
          DB_PASSWORD: ${{ steps.env.outputs.db_password }}
          JWT_SECRET: ${{ steps.env.outputs.jwt_secret }}
          REDIS_HOST: ${{ secrets.REDIS_HOST_STAGE }}
          KAFKA_SERVERS: ${{ secrets.KAFKA_SERVERS_STAGE }}
          NCP_ACCESS_KEY: ${{ secrets.NCP_ACCESS_KEY }}
          NCP_SECRET_KEY: ${{ secrets.NCP_SECRET_KEY }}
          NCP_BUCKET: ${{ secrets.NCP_BUCKET_DEPLOY }}
        run: |
          # Bastion 경유 App Server에서 배포 실행
          ssh -i ~/.ssh/bastion_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            "ssh -i /root/fivefy-app-key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              'set -e

              DEPLOY_ENV=$DEPLOY_ENV
              PORT=$PORT
              APP_DIR=/root/app/$DEPLOY_ENV

              echo ===== [$DEPLOY_ENV] 배포 시작 =====

              # Object Storage에서 JAR 다운로드
              AWS_ACCESS_KEY_ID=$NCP_ACCESS_KEY \
              AWS_SECRET_ACCESS_KEY=$NCP_SECRET_KEY \
              aws s3 cp s3://$NCP_BUCKET/deploy/$DEPLOY_ENV/app.jar \
                \$APP_DIR/app-new.jar \
                --endpoint-url=https://kr.object.ncloudstorage.com

              # 기존 앱 종료
              pkill -f \"spring.profiles.active=\$DEPLOY_ENV\" || true
              sleep 3

              # 새 JAR 교체
              mv \$APP_DIR/app-new.jar \$APP_DIR/app.jar

              # 앱 실행
              nohup java \
                -XX:+UseContainerSupport \
                -XX:MaxRAMPercentage=75.0 \
                -Dspring.profiles.active=\$DEPLOY_ENV \
                -Dserver.port=\$PORT \
                -Dspring.datasource.url=$DB_URL \
                -Dspring.datasource.username=$DB_USERNAME \
                -Dspring.datasource.password=$DB_PASSWORD \
                -Dspring.data.redis.host=$REDIS_HOST \
                -Dspring.kafka.bootstrap-servers=$KAFKA_SERVERS \
                -Djwt.secret=$JWT_SECRET \
                -jar \$APP_DIR/app.jar > \$APP_DIR/app.log 2>&1 &

              # 헬스체크 (최대 60초 대기)
              for i in \$(seq 1 12); do
                STATUS=\$(curl -s -o /dev/null -w \"%{http_code}\" http://localhost:\$PORT/actuator/health)
                if [ \"\$STATUS\" = \"200\" ]; then
                  echo 헬스체크 성공
                  break
                fi
                echo 대기중... \$i/12
                sleep 5
              done

              if [ \"\$STATUS\" != \"200\" ]; then
                echo 헬스체크 실패 — 롤백
                pkill -f \"spring.profiles.active=\$DEPLOY_ENV\" || true
                exit 1
              fi

              echo ===== [$DEPLOY_ENV] 배포 완료 ====='"

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ steps.env.outputs.name }}';
            const port = '${{ steps.env.outputs.port }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **[${env.toUpperCase()}] 배포 완료** — port: ${port}`
            })

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ steps.env.outputs.name }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **[${env.toUpperCase()}] 배포 실패** — 롤백 처리됨. 로그를 확인해주세요.`
            })

      # SSH 키 정리
      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/bastion_key ~/.ssh/server_key
