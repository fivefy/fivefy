name: CD вҖ” Deploy

on:
  push:
    branches: [stage]
  workflow_dispatch:
  pull_request:
    branches: [ stage, main ]
    types: [ closed ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # лЁём§Җлҗң PRл§Ң мӢӨн–ү + лёҢлһңм№ҳ мҠ№кІ© мІҙмқё к°•м ң (devвҶ’stage, stageвҶ’main)
    if: |
      github.event.pull_request.merged == true && (
        (github.base_ref == 'stage' && github.head_ref == 'dev') ||
        (github.base_ref == 'main'  && github.head_ref == 'stage')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # CIм—җм„ң мқҙлҜё н…ҢмҠӨнҠё нҶөкіј вҶ’ н…ҢмҠӨнҠё мҠӨнӮө
      - name: Build JAR
        run: ./gradlew bootJar -x test -x asciidoctor --no-daemon

      # л°°нҸ¬ нҷҳкІҪ кІ°м • + нҷҳкІҪлі„ мӢңнҒ¬лҰҝ л¶„кё°
      - name: Set deploy environment
        id: env
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "name=prod"                                        >> $GITHUB_OUTPUT
            echo "port=8081"                                        >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.DB_URL_PROD }}"               >> $GITHUB_OUTPUT
            echo "db_username=${{ secrets.DB_USERNAME_PROD }}"     >> $GITHUB_OUTPUT
            echo "db_password=${{ secrets.DB_PASSWORD_PROD }}"     >> $GITHUB_OUTPUT
            echo "redis_host=${{ secrets.REDIS_HOST_PROD }}"       >> $GITHUB_OUTPUT
            echo "redis_password=${{ secrets.REDIS_PASSWORD_PROD }}" >> $GITHUB_OUTPUT
            echo "kafka_servers=${{ secrets.KAFKA_SERVERS_PROD }}" >> $GITHUB_OUTPUT
            echo "jwt_secret=${{ secrets.JWT_SECRET_PROD }}"       >> $GITHUB_OUTPUT
          else
            echo "name=stage"                                       >> $GITHUB_OUTPUT
            echo "port=8080"                                        >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.DB_URL_STAGE }}"              >> $GITHUB_OUTPUT
            echo "db_username=${{ secrets.DB_USERNAME_STAGE }}"    >> $GITHUB_OUTPUT
            echo "db_password=${{ secrets.DB_PASSWORD_STAGE }}"    >> $GITHUB_OUTPUT
            echo "redis_host=${{ secrets.REDIS_HOST_STAGE }}"      >> $GITHUB_OUTPUT
            echo "redis_password=${{ secrets.REDIS_PASSWORD_STAGE }}" >> $GITHUB_OUTPUT
            echo "kafka_servers=${{ secrets.KAFKA_SERVERS_STAGE }}" >> $GITHUB_OUTPUT
            echo "jwt_secret=${{ secrets.JWT_SECRET_STAGE }}"      >> $GITHUB_OUTPUT
          fi

      # JAR вҶ’ NCP Object Storage м—…лЎңл“ң (S3 нҳёнҷҳ API)
      - name: Upload JAR to Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NCP_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NCP_SECRET_KEY }}
          AWS_DEFAULT_REGION: kr-standard
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
        run: |
          DEPLOY_ENV=${{ steps.env.outputs.name }}
          aws configure set default.s3.multipart_threshold 200MB
          aws s3 cp build/libs/*.jar \
            s3://${{ secrets.NCP_BUCKET_DEPLOY }}/deploy/$DEPLOY_ENV/app.jar \
            --endpoint-url=https://kr.object.ncloudstorage.com

      # SSH нӮӨ м„Өм • + known_hosts мӮ¬м „ л“ұлЎқ (StrictHostKeyChecking мң м§Җ)
      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          echo "${{ secrets.SERVER_SSH_KEY }}"  > ~/.ssh/server_key
          chmod 600 ~/.ssh/bastion_key ~/.ssh/server_key

          # Bastion known_hosts л“ұлЎқ
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

          # App Server known_hosts л“ұлЎқ (Bastion кІҪмң )
          ssh -i ~/.ssh/bastion_key \
            ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            "ssh-keyscan -H ${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      # Bastion кІҪмң  App Server л°°нҸ¬
      - name: Deploy via Bastion
        env:
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
          PORT: ${{ steps.env.outputs.port }}
          DB_URL: ${{ steps.env.outputs.db_url }}
          DB_USERNAME: ${{ steps.env.outputs.db_username }}
          DB_PASSWORD: ${{ steps.env.outputs.db_password }}
          REDIS_HOST: ${{ steps.env.outputs.redis_host }}
          REDIS_PASSWORD: ${{ steps.env.outputs.redis_password }}
          KAFKA_SERVERS: ${{ steps.env.outputs.kafka_servers }}
          JWT_SECRET: ${{ steps.env.outputs.jwt_secret }}
          NCP_ACCESS_KEY: ${{ secrets.NCP_ACCESS_KEY }}
          NCP_SECRET_KEY: ${{ secrets.NCP_SECRET_KEY }}
          NCP_BUCKET: ${{ secrets.NCP_BUCKET_DEPLOY }}
          PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
          PORTONE_STORE_ID: ${{ secrets.PORTONE_STORE_ID }}
          PORTONE_API_URL: ${{ secrets.PORTONE_API_URL }}
          PORTONE_CHANNEL_KEY: ${{ secrets.PORTONE_CHANNEL_KEY }}
          PORTONE_WEBHOOK_SECRET: ${{ secrets.PORTONE_WEBHOOK_SECRET }}
        run: |
          ssh -i ~/.ssh/bastion_key \
            ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            "ssh -i /root/fivefy-app-key.pem \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              'set -e

              DEPLOY_ENV=$DEPLOY_ENV
              PORT=$PORT
              APP_DIR=/root/app/$DEPLOY_ENV

              echo ===== [$DEPLOY_ENV] л°°нҸ¬ мӢңмһ‘ =====

              # Object Storageм—җм„ң мғҲ JAR лӢӨмҡҙлЎңл“ң
              AWS_ACCESS_KEY_ID=$NCP_ACCESS_KEY \
              AWS_SECRET_ACCESS_KEY=$NCP_SECRET_KEY \
              aws s3 cp s3://$NCP_BUCKET/deploy/$DEPLOY_ENV/app.jar \
                \$APP_DIR/app-new.jar \
                --endpoint-url=https://kr.object.ncloudstorage.com

              # кё°мЎҙ JAR л°ұм—… (лЎӨл°ұмҡ©)
              if [ -f \$APP_DIR/app.jar ]; then
                cp \$APP_DIR/app.jar \$APP_DIR/app-backup.jar
              fi

              # мғҲ JAR көҗмІҙ
              mv \$APP_DIR/app-new.jar \$APP_DIR/app.jar

              # кё°мЎҙ м•ұ мў…лЈҢ
              pkill -f "spring.profiles.active=\$DEPLOY_ENV" || true
              sleep 3

              # м•ұ мӢӨн–ү
              nohup java \
                -XX:+UseContainerSupport \
                -XX:MaxRAMPercentage=75.0 \
                -Dspring.profiles.active=\$DEPLOY_ENV \
                -Dserver.port=\$PORT \
                -Dspring.datasource.url=$DB_URL \
                -Dspring.datasource.username=$DB_USERNAME \
                -Dspring.datasource.password=$DB_PASSWORD \
                -Dspring.data.redis.host=$REDIS_HOST \
                -Dspring.data.redis.password=$REDIS_PASSWORD \
                -Dspring.kafka.bootstrap-servers=$KAFKA_SERVERS \
                -Djwt.secret=$JWT_SECRET \
                -Dportone.api-secret=$PORTONE_API_SECRET \
                -Dportone.store-id=$PORTONE_STORE_ID \
                -Dportone.api-url=$PORTONE_API_URL \
                -Dportone.channel-key=$PORTONE_CHANNEL_KEY \
                -Dportone.webhook-secret=$PORTONE_WEBHOOK_SECRET \
                -jar \$APP_DIR/app.jar > \$APP_DIR/app.log 2>&1 &

              # н—¬мҠӨмІҙнҒ¬ (мөңлҢҖ 60мҙҲ лҢҖкё°)
              STATUS=""
              for i in \$(seq 1 12); do
                STATUS=\$(curl -s -o /dev/null -w "%{http_code}" http://localhost:\$PORT/actuator/health)
                if [ "\$STATUS" = "200" ]; then
                  echo н—¬мҠӨмІҙнҒ¬ м„ұкіө
                  break
                fi
                echo лҢҖкё°мӨ‘... \$i/12
                sleep 5
              done

              # н—¬мҠӨмІҙнҒ¬ мӢӨнҢЁ мӢң л°ұм—… JARлЎң лЎӨл°ұ
              if [ "\$STATUS" != "200" ]; then
                echo н—¬мҠӨмІҙнҒ¬ мӢӨнҢЁ вҖ” мқҙм „ лІ„м „мңјлЎң лЎӨл°ұ
                pkill -f "spring.profiles.active=\$DEPLOY_ENV" || true
                sleep 2

                if [ -f \$APP_DIR/app-backup.jar ]; then
                  cp \$APP_DIR/app-backup.jar \$APP_DIR/app.jar
                  nohup java \
                    -XX:+UseContainerSupport \
                    -XX:MaxRAMPercentage=75.0 \
                    -Dspring.profiles.active=\$DEPLOY_ENV \
                    -Dserver.port=\$PORT \
                    -Dspring.datasource.url=$DB_URL \
                    -Dspring.datasource.username=$DB_USERNAME \
                    -Dspring.datasource.password=$DB_PASSWORD \
                    -Dspring.data.redis.host=$REDIS_HOST \
                    -Dspring.data.redis.password=$REDIS_PASSWORD \
                    -Dspring.kafka.bootstrap-servers=$KAFKA_SERVERS \
                    -Djwt.secret=$JWT_SECRET \
                    -Dportone.api-secret=$PORTONE_API_SECRET \
                    -Dportone.store-id=$PORTONE_STORE_ID \
                    -Dportone.api-url=$PORTONE_API_URL \
                    -Dportone.channel-key=$PORTONE_CHANNEL_KEY \
                    -Dportone.webhook-secret=$PORTONE_WEBHOOK_SECRET \
                    -jar \$APP_DIR/app.jar > \$APP_DIR/app.log 2>&1 &
                  echo мқҙм „ лІ„м „мңјлЎң лЎӨл°ұ мҷ„лЈҢ
                else
                  echo л°ұм—… нҢҢмқј м—ҶмқҢ вҖ” лЎӨл°ұ л¶Ҳк°Җ
                fi
                exit 1
              fi

              echo ===== [$DEPLOY_ENV] л°°нҸ¬ мҷ„лЈҢ ====='"

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ steps.env.outputs.name }}';
            const port = '${{ steps.env.outputs.port }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `вң… **[${env.toUpperCase()}] л°°нҸ¬ мҷ„лЈҢ** вҖ” port: ${port}`
            })

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ steps.env.outputs.name }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `вқҢ **[${env.toUpperCase()}] л°°нҸ¬ мӢӨнҢЁ** вҖ” лЎӨл°ұ мІҳлҰ¬лҗЁ. лЎңк·ёлҘј нҷ•мқён•ҙмЈјм„ёмҡ”.`
            })

      # SSH нӮӨ м •лҰ¬
      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/bastion_key ~/.ssh/server_key
